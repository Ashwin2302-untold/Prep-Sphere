kind = "web"
previewPath = "/"
title = "Prepsphere"
version = "1.0.0"
id = "artifacts/prepsphere"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18108

[services.development]
run = "pnpm --filter @workspace/prepsphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prepsphere", "run", "build" ]
publicDir = "artifacts/prepsphere/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18108"
BASE_PATH = "/"
